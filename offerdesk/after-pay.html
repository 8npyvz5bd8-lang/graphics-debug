<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>付款后提交信息 - OfferDesk 专业版</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f4f5f2;color:#151916;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC",sans-serif;line-height:1.7}.wrap{max-width:860px;margin:0 auto;padding:30px 18px}.card{background:#fff;border:1px solid #d9ded7;border-radius:12px;padding:24px;box-shadow:0 20px 60px rgba(20,26,22,.12)}h1{margin:0 0 10px;font-size:34px;line-height:1.08}p{margin:0 0 14px;color:#667065}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}label{display:grid;gap:6px;color:#667065;font-size:13px;font-weight:900}input,textarea{width:100%;border:1px solid #d9ded7;border-radius:8px;background:#fff;padding:11px;color:#151916;font:inherit;font-weight:700}textarea{min-height:96px;resize:vertical}.wide{grid-column:1/-1}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border-radius:999px;padding:0 18px;text-decoration:none;font-weight:900;border:1px solid #151916;color:#151916;background:#fff;cursor:pointer}.primary{background:#0f8a55;border-color:#0f8a55;color:#fff}.blue{background:#2563eb;border-color:#2563eb;color:#fff}.notice{margin-top:14px;color:#0f8a55;font-weight:900}.steps{margin:14px 0 0;padding-left:20px;color:#333}.foot{margin-top:18px;color:#667065;font-size:13px}.top{margin-bottom:14px}.top a{color:#151916;font-weight:800}@media(max-width:720px){.grid{grid-template-columns:1fr}h1{font-size:28px}.actions .btn{width:100%}}
  </style>
</head>
<body>
  <main class="wrap">
    <p class="top"><a href="./pay.html">返回付款页</a> · <a href="./">打开软件</a></p>
    <section class="card">
      <h1>付款后提交信息</h1>
      <p>付款后把下面信息发到客服邮箱。确认到账后，会回复专业版授权码。</p>
      <form id="claimForm" class="grid">
        <label>
          付款时间
          <input id="paidAt" type="text" placeholder="例如：2026-06-11 16:30" />
        </label>
        <label>
          付款金额
          <input id="amount" type="text" value="29 元" />
        </label>
        <label>
          你的邮箱
          <input id="buyerEmail" type="email" placeholder="用于接收授权码" />
        </label>
        <label>
          支付宝昵称或备注
          <input id="payerName" type="text" placeholder="方便核对到账" />
        </label>
        <label class="wide">
          其他说明
          <textarea id="note" placeholder="可以写付款截图说明、订单备注或你希望绑定的使用者名称"></textarea>
        </label>
      </form>
      <div class="actions">
        <a class="btn primary" id="mailLink" href="mailto:534403209@qq.com">发送邮件领取授权码</a>
        <button class="btn blue" id="copyButton" type="button">复制提交内容</button>
        <a class="btn" href="./">打开 OfferDesk</a>
      </div>
      <p class="notice" id="notice"></p>
      <ol class="steps">
        <li>先在付款页用支付宝支付 29 元。</li>
        <li>填写上面的付款信息。</li>
        <li>点击“发送邮件领取授权码”。</li>
        <li>收到授权码后回到 OfferDesk 解锁专业版。</li>
      </ol>
      <p class="foot">客服邮箱：<a href="mailto:534403209@qq.com">534403209@qq.com</a></p>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const supportEmail = '534403209@qq.com';
    function buildBody() {
      return [
        '我已支付 OfferDesk 专业版 29 元，请发送授权码。',
        '',
        `付款时间：${$('paidAt').value.trim()}`,
        `付款金额：${$('amount').value.trim() || '29 元'}`,
        `我的邮箱：${$('buyerEmail').value.trim()}`,
        `支付宝昵称或备注：${$('payerName').value.trim()}`,
        '',
        `其他说明：${$('note').value.trim()}`,
        '',
        '软件地址：https://8npyvz5bd8-lang.github.io/graphics-debug/offerdesk/'
      ].join('\n');
    }
    function updateMailLink() {
      const subject = encodeURIComponent('OfferDesk 专业版授权码领取');
      const body = encodeURIComponent(buildBody());
      $('mailLink').href = `mailto:${supportEmail}?subject=${subject}&body=${body}`;
    }
    document.querySelectorAll('input, textarea').forEach((el) => el.addEventListener('input', updateMailLink));
    $('copyButton').addEventListener('click', async () => {
      updateMailLink();
      await navigator.clipboard.writeText(buildBody());
      $('notice').textContent = '提交内容已复制，可以粘贴到邮件或聊天里发送。';
    });
    updateMailLink();
  </script>
</body>
</html>
