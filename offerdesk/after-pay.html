<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="robots" content="noindex"><title>备用人工处理 - OfferDesk 专业版</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f5f2;color:#151916;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,PingFang SC,sans-serif;line-height:1.7}.wrap{width:min(760px,100%);margin:0 auto;padding:32px 18px}.card{border:1px solid #d9ded7;border-radius:10px;background:#fff;padding:22px;box-shadow:0 14px 38px rgba(20,26,22,.08)}a{color:#0f8a55;font-weight:900}.grid{display:grid;gap:12px}label{display:grid;gap:6px;font-weight:900;color:#667065}input,textarea{width:100%;border:1px solid #d9ded7;border-radius:8px;padding:10px;font:inherit}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border:1px solid #151916;border-radius:999px;background:#fff;padding:0 16px;color:#151916;font-weight:900;text-decoration:none;cursor:pointer}.green{background:#0f8a55;border-color:#0f8a55;color:#fff}.blue{background:#2563eb;border-color:#2563eb;color:#fff}.notice{color:#0f8a55;font-weight:900}.warn{border-left:4px solid #b42318;background:#fff6f5;padding:10px;margin:12px 0}@media(max-width:640px){.btn{width:100%}}</style></head><body><main class="wrap"><p><a href="./buy.html">返回成交页</a> · <a href="./index.html">打开软件</a></p><section class="card"><h1>备用人工处理</h1><div class="warn">正常目标是自动收款、自动发授权码。只有买家没收到平台邮件，或当前还在使用支付宝备用收款时，才用这个页面。</div><p>把下面信息发到客服邮箱。核对后会补发专业版授权码。</p><form class="grid"><label>付款时间<input id="paidAt" placeholder="例如：2026-06-11 16:30"></label><label>付款金额<input id="amount" value="29 元"></label><label>你的邮箱<input id="buyerEmail" type="email" placeholder="用于接收授权码"></label><label>支付宝昵称、订单号或备注<input id="payerName" placeholder="方便核对"></label><label>其他说明<textarea id="note" placeholder="可以写付款截图说明、订单备注或你希望绑定的使用者名称"></textarea></label><label>要提交的内容<textarea id="submitContent" readonly rows="8"></textarea></label></form><div class="actions"><a class="btn green" id="mailLink" href="mailto:534403209@qq.com">发送邮件</a><button class="btn blue" id="copyButton">复制提交内容</button><button class="btn" id="copyEmailButton">复制客服邮箱</button></div><p class="notice" id="notice"></p><p>客服邮箱：<a href="mailto:534403209@qq.com">534403209@qq.com</a></p></section></main><script>const $=id=>document.getElementById(id);function build(){const lines=['OfferDesk 专业版备用人工处理','付款时间：'+$('paidAt').value.trim(),'付款金额：'+$('amount').value.trim(),'我的邮箱：'+$('buyerEmail').value.trim(),'订单号/支付宝昵称/备注：'+$('payerName').value.trim(),'其他说明：'+$('note').value.trim()];const text=lines.join('\n');$('submitContent').value=text;$('mailLink').href='mailto:534403209@qq.com?subject='+encodeURIComponent('OfferDesk 专业版备用处理')+'&body='+encodeURIComponent(text)}document.addEventListener('input',build);$('copyButton').onclick=async()=>{build();await navigator.clipboard.writeText($('submitContent').value);$('notice').textContent='已复制提交内容。'};$('copyEmailButton').onclick=async()=>{await navigator.clipboard.writeText('534403209@qq.com');$('notice').textContent='已复制客服邮箱。'};build();</script></body></html>
