<!doctype html>
<html lang='zh-CN'>
<head>
<meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'>
<title>付款后提交信息 - OfferDesk 专业版</title>
<meta name='description' content='支付 OfferDesk 专业版后提交付款信息，用于核对到账并领取授权码。'>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f5f2;color:#151916;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,PingFang SC,sans-serif;line-height:1.7}a{color:inherit}.wrap{width:min(860px,100%);margin:0 auto;padding:30px 18px}.card{border:1px solid #d9ded7;border-radius:12px;background:#fff;padding:24px;box-shadow:0 20px 60px rgba(20,26,22,.12)}h1{margin:0 0 10px;font-size:34px;line-height:1.08}p{margin:0 0 14px;color:#667065}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}label{display:grid;gap:6px;color:#667065;font-size:13px;font-weight:900}input,textarea{width:100%;border:1px solid #d9ded7;border-radius:8px;background:#fff;padding:11px;color:#151916;font:inherit;font-weight:700}textarea{min-height:96px;resize:vertical}.wide{grid-column:1/-1}.submit{min-height:168px;background:#f8faf7;color:#303830}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border:1px solid #151916;border-radius:999px;background:#fff;padding:0 18px;color:#151916;font-weight:900;text-decoration:none;cursor:pointer}.primary{background:#0f8a55;border-color:#0f8a55;color:#fff}.blue{background:#2563eb;border-color:#2563eb;color:#fff}.notice{margin-top:14px;color:#0f8a55;font-weight:900}.steps{margin:14px 0 0;padding-left:20px;color:#333}.top,.foot{font-size:13px}@media(max-width:720px){.grid{grid-template-columns:1fr}h1{font-size:28px}.actions .btn{width:100%}}
</style>
</head>
<body>
<main class='wrap'>
<p class='top'><a href='./pay.html'>返回付款页</a> · <a href='./index.html'>打开软件</a></p>
<section class='card'>
<h1>付款后提交信息</h1>
<p>付款后把下面信息发到客服邮箱。确认到账后，会回复专业版授权码。</p>
<form class='grid'>
<label>付款时间<input id='paidAt' type='text' placeholder='例如：2026-06-11 16:30'></label>
<label>付款金额<input id='amount' type='text' value='29 元'></label>
<label>你的邮箱<input id='buyerEmail' type='email' placeholder='用于接收授权码'></label>
<label>支付宝昵称或备注<input id='payerName' type='text' placeholder='方便核对到账'></label>
<label class='wide'>其他说明<textarea id='note' placeholder='可以写付款截图说明、订单备注或你希望绑定的使用者名称'></textarea></label>
<label class='wide'>要提交的内容<textarea id='submitContent' class='submit' readonly></textarea></label>
</form>
<div class='actions'>
<a class='btn primary' id='mailLink' href='mailto:534403209@qq.com'>发送邮件领取授权码</a>
<button class='btn blue' id='copyButton' type='button'>复制提交内容</button>
<button class='btn' id='copyEmailButton' type='button'>复制客服邮箱</button>
<a class='btn' href='./index.html'>打开 OfferDesk</a>
</div>
<p class='notice' id='notice'></p>
<ol class='steps'>
<li>先在付款页用支付宝支付 29 元。</li>
<li>填写上面的付款信息。</li>
<li>如果邮件 App 能打开，点“发送邮件领取授权码”。</li>
<li>如果邮件 App 不方便用，点复制按钮，把内容发给客服邮箱。</li>
</ol>
<p class='foot'>客服邮箱：<a href='mailto:534403209@qq.com'>534403209@qq.com</a></p>
</section>
</main>
<script>
const $=id=>document.getElementById(id);const supportEmail='534403209@qq.com';
function body(){return ['我已支付 OfferDesk 专业版 29 元，请发送授权码。','',`付款时间：${$('paidAt').value.trim()}`,`付款金额：${$('amount').value.trim()||'29 元'}`,`我的邮箱：${$('buyerEmail').value.trim()}`,`支付宝昵称或备注：${$('payerName').value.trim()}`,'',`其他说明：${$('note').value.trim()}`,'','软件地址：https://8npyvz5bd8-lang.github.io/graphics-debug/offerdesk/'].join('\n')}
function refresh(){const text=body();$('submitContent').value=text;$('mailLink').href=`mailto:${supportEmail}?subject=${encodeURIComponent('OfferDesk 专业版授权码领取')}&body=${encodeURIComponent(text)}`}
document.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',refresh));
$('copyButton').onclick=async()=>{refresh();await navigator.clipboard.writeText($('submitContent').value);$('notice').textContent='提交内容已复制，可以粘贴到邮件或聊天里发送。'};
$('copyEmailButton').onclick=async()=>{await navigator.clipboard.writeText(supportEmail);$('notice').textContent='客服邮箱已复制。'};
refresh();
</script>
</body>
</html>
