<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OfferDesk 报价单赚钱助手</title>
<meta name="description" content="给自由职业者和小团队用的报价单、利润率和首付款计算工具。">
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f5f2;color:#151916;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,PingFang SC,sans-serif;line-height:1.6}a{color:inherit}button,input,textarea{font:inherit}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 20px;border-bottom:1px solid #d9ded7;background:#fff}.brand{font-weight:900;text-decoration:none}.actions,.buy,.row,.totals div{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{min-height:38px;border:1px solid #151916;border-radius:8px;background:#fff;padding:0 14px;font-weight:900;text-decoration:none;cursor:pointer}.green{background:#0f8a55;border-color:#0f8a55;color:#fff}.blue{background:#2563eb;border-color:#2563eb;color:#fff}.wrap{display:grid;grid-template-columns:minmax(320px,.9fr) minmax(360px,1.1fr);gap:18px;padding:18px}.card,.paper{border:1px solid #d9ded7;border-radius:10px;background:#fff;padding:18px;box-shadow:0 12px 36px rgba(20,26,22,.08)}h1{font-size:30px;line-height:1.1;margin:0 0 10px}h2{margin:0 0 10px}.muted,p,label{color:#667065}label{display:grid;gap:5px;font-size:13px;font-weight:800}input,textarea{width:100%;border:1px solid #d9ded7;border-radius:8px;padding:9px;background:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wide{grid-column:1/-1}.items{margin-top:14px;display:grid;gap:8px}.item{display:grid;grid-template-columns:1fr 70px 100px 100px;gap:8px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.stat{border:1px solid #d9ded7;border-radius:8px;padding:12px;background:#fff}.stat span{display:block;color:#667065;font-size:12px;font-weight:900}.stat strong{display:block;font-size:22px;margin-top:6px}.paper{position:relative;min-height:480px}.watermark{position:absolute;right:15px;bottom:90px;transform:rotate(-28deg);font-size:44px;font-weight:900;color:rgba(21,25,22,.08)}.hide,[hidden]{display:none!important}.quote-head{border-bottom:2px solid #151916;margin-bottom:16px;padding-bottom:12px}.quote-head h2{font-size:34px}.client{border-left:4px solid #0f8a55;background:#edf8f2;padding:10px;margin:12px 0}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #d9ded7;padding:9px 0;text-align:left}th:not(:first-child),td:not(:first-child){text-align:right}.totals{width:min(300px,100%);margin:16px 0 0 auto}.totals div{justify-content:space-between}.grand{border-top:2px solid #151916;padding-top:8px;font-size:20px}.pay{margin-top:14px;border:1px solid #d9ded7;border-radius:10px;background:#fff;padding:16px}.notice{min-height:22px;color:#0f8a55;font-weight:900}.foot{text-align:center;color:#667065;padding:0 0 24px;font-size:13px}@media(max-width:850px){.wrap,.grid,.summary,.item{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.actions .btn,.buy .btn{width:100%}}@media print{.top,.card,.pay,.summary,.foot{display:none}.wrap{display:block;padding:0}.paper{border:0;box-shadow:none}}
</style>
</head>
<body>
<header class="top"><a class="brand" href="./">OfferDesk 报价单赚钱助手</a><nav class="actions"><button class="btn" id="copy">复制报价</button><button class="btn" onclick="print()">导出 PDF</button><a class="btn green" id="topBuy" href="./buy.html">29 元购买</a></nav></header>
<main class="wrap">
<section class="card"><h1>接单报价前，先知道这单赚不赚钱。</h1><p>输入成本、单价、折扣和首付款，自动生成客户能看的报价单。</p><div class="grid"><label>你的品牌<input id="seller" value="你的品牌"></label><label>客户名称<input id="client" value="客户名称"></label><label class="wide">项目名称<input id="project" value="官网设计与开发"></label><label>币种<input id="currency" value="¥"></label><label>首付款 %<input id="deposit" type="number" value="50"></label><label>税费 %<input id="tax" type="number" value="6"></label><label>折扣 %<input id="discount" type="number" value="0"></label><label>目标利润 %<input id="target" type="number" value="35"></label><label class="wide">付款条款<textarea id="terms">项目启动前支付首付款，交付前支付尾款。报价有效期 7 天。</textarea></label></div><div class="items" id="items"></div></section>
<section><div class="summary"><div class="stat"><span>利润状态</span><strong id="health">计算中</strong></div><div class="stat"><span>预计利润</span><strong id="profit">¥0</strong></div><div class="stat"><span>首付款</span><strong id="depositOut">¥0</strong></div></div><article class="paper" id="quote"><div class="watermark" id="watermark">OfferDesk Free</div><div class="quote-head"><div class="muted">报价单</div><h2 id="qProject">项目报价</h2><p id="qSeller">你的品牌</p></div><div class="client"><span class="muted">客户</span><h3 id="qClient">客户名称</h3></div><table><thead><tr><th>项目</th><th>数量</th><th>单价</th><th>金额</th></tr></thead><tbody id="qItems"></tbody></table><div class="totals"><div><span>小计</span><strong id="subtotal">¥0</strong></div><div><span>折扣</span><strong id="discountOut">¥0</strong></div><div><span>税费</span><strong id="taxOut">¥0</strong></div><div class="grand"><span>总价</span><strong id="total">¥0</strong></div></div><h3>条款</h3><p id="qTerms"></p></article><section class="pay"><h2>专业版 29 元</h2><p id="payText">专业版会去掉免费水印。当前购买入口优先打开成交页；接入自动平台后，付款平台会自动发送授权码。</p><div class="buy"><a class="btn green" id="checkout" href="./buy.html">打开购买页</a><a class="btn blue" id="claim" href="./after-pay.html">付款后提交信息</a><a class="btn" href="https://qr.alipay.com/fkx18699evozd44sg2kip49" target="_blank" rel="noreferrer">支付宝备用链接</a></div><p>客服邮箱：<a href="mailto:534403209@qq.com">534403209@qq.com</a></p><div class="buy"><input id="license" placeholder="输入授权码"><button class="btn blue" id="unlock">解锁专业版</button></div><div class="notice" id="notice"></div></section></section>
</main><footer class="foot"><a href="./sales.html">销售页</a> · <a href="./buy.html">成交页</a> · <a href="./privacy.html">隐私</a> · <a href="./terms.html">条款</a> · <a href="./refund.html">退款</a></footer>
<script src="./app-config.js?v=auto-payment"></script>
<script>
const $=id=>document.getElementById(id);const config=window.OFFERDESK_CONFIG||{};const localKey="offerdeskPro";const externalKey="offerdesk.externalLicense.v1";let pro=localStorage.getItem(localKey)==="1"||Boolean(readExternal());let items=[["页面设计",1,1800,300],["前端开发",1,3200,900],["上线支持",1,800,120]];
function money(n){return ($("currency").value||"¥")+Math.round(Number(n)||0).toLocaleString("zh-CN")}function num(id){return Number($(id).value)||0}function esc(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function isLemon(){return String(config.licenseProvider||"local").toLowerCase()==="lemonsqueezy"&&String(config.autoCheckoutUrl||"").startsWith("https://")}
function readExternal(){try{return JSON.parse(localStorage.getItem(externalKey)||"null")}catch{return null}}
function setupPayment(){if(isLemon()){$("checkout").href=config.autoCheckoutUrl;$("topBuy").href=config.autoCheckoutUrl;$("checkout").textContent="自动付款并收授权码";$("topBuy").textContent="自动购买";$("claim").hidden=true;$("payText").textContent="付款平台会自动收款，并把专业版授权码发到你的邮箱。收到后在这里输入即可去水印。"}else{$("checkout").href="./buy.html";$("topBuy").href="./buy.html";$("payText").textContent="自动收款平台还没配置，当前是人工备用收款。"}}
function drawItems(){itemsEl.innerHTML=items.map((it,i)=>`<div class="item"><input data-i="${i}" data-k="0" value="${esc(it[0])}"><input data-i="${i}" data-k="1" type="number" value="${it[1]}"><input data-i="${i}" data-k="2" type="number" value="${it[2]}"><input data-i="${i}" data-k="3" type="number" value="${it[3]}"></div>`).join("")}
const itemsEl=$("items");drawItems();function calc(){let sub=0,cost=0;items.forEach(it=>{sub+=Number(it[1])*Number(it[2]);cost+=Number(it[1])*Number(it[3])});let disc=sub*num("discount")/100,tax=(sub-disc)*num("tax")/100,total=sub-disc+tax,profit=sub-disc-cost,margin=sub?profit/(sub-disc)*100:0,target=num("target");$("profit").textContent=money(profit);$("depositOut").textContent=money(total*num("deposit")/100);$("subtotal").textContent=money(sub);$("discountOut").textContent="-"+money(disc);$("taxOut").textContent=money(tax);$("total").textContent=money(total);$("health").textContent=margin>=target?"利润健康":margin>=target*.7?"利润偏低":"建议重报";$("qProject").textContent=$("project").value;$("qSeller").textContent=$("seller").value;$("qClient").textContent=$("client").value;$("qTerms").textContent=$("terms").value;$("qItems").innerHTML=items.map(it=>`<tr><td>${esc(it[0])}</td><td>${it[1]}</td><td>${money(it[2])}</td><td>${money(Number(it[1])*Number(it[2]))}</td></tr>`).join("");$("watermark").classList.toggle("hide",pro)}
document.addEventListener("input",e=>{if(e.target.dataset.i){items[e.target.dataset.i][e.target.dataset.k]=e.target.dataset.k==="0"?e.target.value:Number(e.target.value)}calc()});$("copy").onclick=async()=>{await navigator.clipboard.writeText($("quote").innerText);$("notice").textContent="报价内容已复制。"};$("unlock").onclick=()=>applyLicense($("license").value.trim());
async function applyLicense(code){if(!code){$("notice").textContent="请输入授权码。";return}$("notice").textContent="正在验证授权码...";try{if(isLemon()){await activateLemon(code)}else{await activateLocal(code)}pro=true;localStorage.setItem(localKey,"1");$("notice").textContent="已解锁专业版，可正式交付。";calc()}catch(error){$("notice").textContent=error.message||"授权码验证失败。"}}
async function activateLocal(code){const hash=String(config.licenseHash||"").trim().toLowerCase();if(!/^[a-f0-9]{64}$/.test(hash)){throw new Error("还没有配置授权码哈希。")}const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(code));const hex=[...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");if(hex!==hash){throw new Error("授权码不正确，请检查后重试。")}}
async function activateLemon(code){const body=new URLSearchParams({license_key:code,instance_name:(($("seller").value||"OfferDesk")+"-"+Date.now().toString(36))});const res=await fetch("https://api.lemonsqueezy.com/v1/licenses/activate",{method:"POST",headers:{Accept:"application/json","Content-Type":"application/x-www-form-urlencoded"},body});const data=await res.json().catch(()=>null);if(!data||!data.valid){throw new Error(data&&data.error?data.error:"授权平台暂时无法验证。")}const product=String(config.lemonSqueezyProductId||"");const variant=String(config.lemonSqueezyVariantId||"");if(product&&String(data.meta&&data.meta.product_id)!==product){throw new Error("授权码不属于 OfferDesk 产品。")}if(variant&&String(data.meta&&data.meta.variant_id)!==variant){throw new Error("授权码不属于当前专业版规格。")}localStorage.setItem(externalKey,JSON.stringify({provider:"lemonsqueezy",key:data.license_key&&data.license_key.key||code,instanceId:data.instance&&data.instance.id||"",checkedAt:new Date().toISOString()}))}
async function applyFromUrl(){const params=new URLSearchParams(location.search);const code=params.get("license_key");if(code&&isLemon()){await applyLicense(code);params.delete("license_key");params.delete("email");params.delete("order_id");history.replaceState({},document.title,location.pathname+(params.toString()?"?"+params.toString():"")+location.hash)}}setupPayment();calc();applyFromUrl();
</script>
</body></html>
