<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="robots" content="noindex"><title>OfferDesk 首单跟进台</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f5f2;color:#151916;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,PingFang SC,sans-serif;line-height:1.6}.wrap{width:min(1180px,100%);margin:0 auto;padding:24px 14px}.top,.links,.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.top{justify-content:space-between}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;border:1px solid #151916;border-radius:999px;background:#fff;padding:0 14px;color:#151916;font-weight:900;text-decoration:none;cursor:pointer}.green{background:#0f8a55;border-color:#0f8a55;color:#fff}.danger{border-color:#b42318;color:#b42318}.panel{border:1px solid #d9ded7;border-radius:10px;background:#fff;padding:14px;margin-top:14px;box-shadow:0 12px 32px rgba(20,26,22,.08)}table{width:100%;border-collapse:collapse;min-width:900px}th,td{border-bottom:1px solid #d9ded7;padding:8px;text-align:left;vertical-align:top}input,select,textarea{width:100%;border:1px solid #d9ded7;border-radius:8px;padding:8px;font:inherit}.table-wrap{overflow:auto}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.stat{border:1px solid #d9ded7;border-radius:8px;padding:10px}.stat span{display:block;color:#667065;font-size:12px;font-weight:900}.stat strong{font-size:24px}@media(max-width:760px){.stats{grid-template-columns:1fr}.btn{width:100%}}</style></head>
<body><main class="wrap"><header class="top"><div><h1>OfferDesk 首单跟进台</h1><p>记录试用、付款和授权码交付状态。</p></div><nav class="links"><a class="btn" href="./share.html">复制文案</a><a class="btn" href="./sales.html">销售页</a><a class="btn" href="./buy.html">成交页</a><a class="btn green" href="./launch/payment-platform-guide.md">自动收款指南</a></nav></header><section class="panel stats"><div class="stat"><span>已联系</span><strong id="contacted">0</strong></div><div class="stat"><span>已试用</span><strong id="trial">0</strong></div><div class="stat"><span>有兴趣</span><strong id="interested">0</strong></div><div class="stat"><span>已付款</span><strong id="paid">0</strong></div><div class="stat"><span>收入</span><strong id="revenue">¥0</strong></div></section><section class="panel"><div class="actions"><button class="btn green" id="addRow">新增一行</button><button class="btn" id="exportCsv">生成 CSV</button><button class="btn" id="copyCsv">复制 CSV</button><button class="btn danger" id="clearDone">清空空白行</button></div><p>状态到“已付款”后，确认买家已收到平台自动授权码；没收到再人工补发。</p></section><section class="panel table-wrap"><table><thead><tr><th>姓名/来源</th><th>状态</th><th>金额</th><th>买家邮箱</th><th>下一步</th><th>备注</th></tr></thead><tbody id="rows"></tbody></table></section><section class="panel"><textarea id="csv" rows="8" readonly></textarea></section></main><script>const key='offerdesk.pipeline.v1';const statuses=['未联系','已联系','已试用','有兴趣','已付款','已退款'];const defaultRows=[{name:'示例：设计师A/小红书',status:'未联系',amount:'',email:'',nextAction:'发销售页',note:''}];let leads=load();function load(){try{return JSON.parse(localStorage.getItem(key)||'null')||defaultRows}catch{return defaultRows}}function save(){localStorage.setItem(key,JSON.stringify(leads))}function input(i,k,v,p=''){return `<input data-i="${i}" data-k="${k}" value="${esc(v)}" placeholder="${p}">`}function textarea(i,k,v,p=''){return `<textarea data-i="${i}" data-k="${k}" placeholder="${p}">${esc(v)}</textarea>`}function select(i,v){return `<select data-i="${i}" data-k="status">${statuses.map(s=>`<option ${s===v?'selected':''}>${s}</option>`).join('')}</select>`}function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function render(){rows.innerHTML=leads.map((l,i)=>`<tr><td>${input(i,'name',l.name,'来源/昵称')}</td><td>${select(i,l.status)}</td><td>${input(i,'amount',l.amount,'29')}</td><td>${input(i,'email',l.email,'买家邮箱')}</td><td>${input(i,'nextAction',l.nextAction,'确认自动授权码')}</td><td>${textarea(i,'note',l.note,'反馈/备注')}</td></tr>`).join('');stats()}function stats(){contacted.textContent=leads.filter(l=>l.status!=='未联系').length;trial.textContent=leads.filter(l=>['已试用','有兴趣','已付款'].includes(l.status)).length;interested.textContent=leads.filter(l=>['有兴趣','已付款'].includes(l.status)).length;paid.textContent=leads.filter(l=>l.status==='已付款').length;revenue.textContent='¥'+leads.filter(l=>l.status==='已付款').reduce((s,l)=>s+(Number(l.amount)||0),0)}function toCsv(){const headers=['name','status','amount','email','next_action','note'];const body=leads.map(l=>[l.name,l.status,l.amount,l.email,l.nextAction,l.note].map(x=>'"'+String(x||'').replaceAll('"','""')+'"').join(','));return [headers.join(','),...body].join('\n')}document.addEventListener('input',e=>{if(e.target.dataset.i){leads[e.target.dataset.i][e.target.dataset.k]=e.target.value;save();stats()}});document.addEventListener('change',e=>{if(e.target.dataset.i){leads[e.target.dataset.i][e.target.dataset.k]=e.target.value;save();stats()}});addRow.onclick=()=>{leads.push({name:'',status:'未联系',amount:'',email:'',nextAction:'',note:''});save();render()};exportCsv.onclick=()=>csv.value=toCsv();copyCsv.onclick=async()=>{csv.value=toCsv();await navigator.clipboard.writeText(csv.value)};clearDone.onclick=()=>{leads=leads.filter(l=>Object.values(l).some(Boolean));if(!leads.length)leads=defaultRows;save();render()};render();</script></body></html>
